<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>صندوق الرسائل</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <h2 class="text-center mb-4 fw-bold text-primary">صندوق الرسائل الواردة</h2>
    
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <table class="table table-hover text-center">
          <thead class="table-dark">
            <tr>
              <th>رقم الرسالة</th>
              <th>اسم المرسل</th>
              <th>الرسالة</th>
            </tr>
          </thead>
          <tbody>
            {% for msg in messages %}
            <tr>
              <td>{{ msg[0] }}</td> <td>{{ msg[1] }}</td> <td>{{ msg[2] }}</td> </tr>
            {% else %}
            <tr>
              <td colspan="3" class="text-muted">لا توجد رسائل حتى الآن.</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
    
    <div class="text-center mt-4">
      <a href="/" class="btn btn-secondary">العودة للرئيسية</a>
    </div>
  </div>

</body>
</html>
